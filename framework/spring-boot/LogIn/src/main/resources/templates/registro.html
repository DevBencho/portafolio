<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Formulario de Registro de Usuarios</h1>

<!-- El 'action' debe coincidir con tu @PostMapping -->
<!-- El 'method' debe ser POST -->
<form th:action="@{/api/usuarios/register}" method="post">

    <!-- Los 'name' deben ser IDENTICOS a los atributos de tu UsuariosDTO -->
    <label>Usuario:</label>
    <input type="text" name="username" required>

    <label>Contraseña:</label>
    <input type="password" name="password" required>

    <label>Email:</label>
    <input type="email" name="email">

    <label>Nombre:</label>
    <input type="text" name="name">

    <label>Apellido:</label>
    <input type="text" name="lastname">

    <label>Edad:</label>
    <input type="number" name="age">

    <label>Género:</label>
    <input type="text" name="gender">

    <button type="submit">Registrar Usuario</button>
</form>
</body>
</html>
